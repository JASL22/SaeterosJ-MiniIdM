global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    timeout connect 5000
    timeout client 50000
    timeout server 50000

frontend ldap_front
    bind *:389
    mode tcp
    default_backend ldap_back

backend ldap_back
    mode tcp
    balance roundrobin
    option tcp-check
    server ldap1 192.168.56.11:389 check
    server ldap2 192.168.56.12:389 check

frontend ldaps_front
    bind *:636
    mode tcp
    default_backend ldaps_back

backend ldaps_back
    mode tcp
    balance roundrobin
    option tcp-check
    server ldap1 192.168.56.11:636 check
    server ldap2 192.168.56.12:636 check

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
