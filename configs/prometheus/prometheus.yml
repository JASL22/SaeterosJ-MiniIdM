global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fis-monitor'

alerting:
  alertmanagers:
  - static_configs:
    - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'fis_nodes'
    static_configs:
      - targets:
          - 'ca.fis.epn.ec:9100'
          - 'ldap1.fis.epn.ec:9100'
          - 'ldap2.fis.epn.ec:9100'
          - 'kdc1.fis.epn.ec:9100'
          - 'kdc2.fis.epn.ec:9100'
          - 'lb-web.fis.epn.ec:9100'

  - job_name: 'haproxy_exporter'
    static_configs:
      - targets: ['lb-web.fis.epn.ec:9101']
